name: Deploy Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  # Runs on PRs (to prepare the dev DB so Preview deployments reflect the new
  # schema) and again on merge to main (no-op if already applied).
  migrate-dev:
    name: Push migrations to dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to dev
        env:
          SUPABASE_DEV_DB_URL: ${{ secrets.SUPABASE_DEV_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DEV_DB_URL" ]; then
            echo "SUPABASE_DEV_DB_URL secret not set — skipping migration."
            exit 0
          fi
          supabase db push --db-url "$SUPABASE_DEV_DB_URL"

  # Production migrations stay merge-gated: only on push to main, never on PRs.
  migrate-prod:
    name: Push migrations to production
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        env:
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
        run: |
          if [ -z "$SUPABASE_PROD_DB_URL" ]; then
            echo "SUPABASE_PROD_DB_URL secret not set — skipping migration."
            exit 0
          fi
          supabase db push --db-url "$SUPABASE_PROD_DB_URL"
