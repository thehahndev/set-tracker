name: Deploy Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    name: Push migrations to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        run: supabase db push --db-url "${{ secrets.SUPABASE_PROD_DB_URL }}"
